[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "python-mois-debug-ui"
version = "0.1.0"
description = "Debug web UI for python-mois-api SQLite localdata databases."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "digitie" }
]
dependencies = [
  "aiosqlite>=0.20",
  "fastapi>=0.115",
  "python-mois-api>=0.1.0",
  "SQLAlchemy>=2.0",
  "uvicorn[standard]>=0.30",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.5",
  "mypy>=1.10",
]

[project.scripts]
mois-debug-ui = "mois_debug_ui.backend.__main__:main"
mois-debug-ui-load-sqlite = "mois_debug_ui.backend.load_sqlite:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["mois_debug_ui*"]

[tool.setuptools.package-data]
mois_debug_ui = ["py.typed"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../../src"]
addopts = "-ra"
